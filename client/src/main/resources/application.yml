# local
spring:
  config:
    activate:
      on-profile: local
  security:
    oauth2:
      client:
        registration:
          my-registration:
            provider: my-provider
            client-id: ${app.client.oidc.client-id}
            client-secret: ${app.client.oidc.client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
        provider:
          my-provider:
            issuer-uri: ${app.client.oidc.issuer-uri}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

app:
  client:
    oidc:
      issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8080/auth}
      client-id: ${AUTH_CLIENT_ID:client_id_1}
      client-secret: ${AUTH_CLIENT_SECRET:client_secret_1}

server:
  port: 8011
  servlet:
    session:
      cookie:
        name: CLIENTSESSION

---
# dev
spring:
  config:
    activate:
      on-profile: dev
  security:
    oauth2:
      client:
        registration:
          my-registration:
            provider: my-provider
            client-id: ${app.client.oidc.client-id}
            client-secret: ${app.client.oidc.client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
        provider:
          my-provider:
            issuer-uri: ${app.client.oidc.issuer-uri}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}

app:
  client:
    oidc:
      issuer-uri: ${AUTH_ISSUER_URI}
      client-id: ${AUTH_CLIENT_ID}
      client-secret: ${AUTH_CLIENT_SECRET}

server:
  port: ${CLIENT_PORT}
  servlet:
    session:
      cookie:
        name: CLIENTSESSION

---
# common
spring:
  application:
    name: client
  cloud:
    service-registry:
      auto-registration:
        enabled: false
    nacos:
      discovery:
        register-enabled: false

app:
  logging:
    path: ${LOG_PATH:./logs}
